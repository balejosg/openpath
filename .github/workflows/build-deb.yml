name: Build and Publish Debian Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 3.5.0)'
        required: true
        type: string
      suite:
        description: 'APT suite to publish to'
        required: false
        type: choice
        options:
          - stable
          - unstable
        default: stable
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      suite:
        required: false
        type: string
        default: unstable

concurrency:
  group: build-deb-${{ github.ref }}-${{ inputs.suite || 'stable' }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    name: Build Debian Package
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      package_name: ${{ steps.version.outputs.package_name }}
      suite: ${{ steps.version.outputs.suite }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: |
          # Determine version
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.event_name }}" = "push" ] && [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            # Fallback: read from version.txt or use 0.0.0
            VERSION=$(cat version.txt 2>/dev/null || echo "0.0.0")
          fi

          # Determine suite
          SUITE="${{ inputs.suite }}"
          if [ -z "$SUITE" ]; then
            # Default: stable for tag pushes, unstable otherwise
            if [ "${{ github.event_name }}" = "push" ] && [[ "$GITHUB_REF" == refs/tags/v* ]]; then
              SUITE="stable"
            else
              SUITE="unstable"
            fi
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "package_name=openpath-dnsmasq_${VERSION}-1_amd64.deb" >> $GITHUB_OUTPUT
          echo "suite=$SUITE" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION for suite: $SUITE"

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Build Firefox Extension
        uses: ./.github/actions/build-workspaces
        with:
          build-shared: 'false'
          build-api: 'false'
          build-extension: 'true'

      - name: Build Debian package
        run: |
          chmod +x linux/scripts/build/build-deb.sh
          ./linux/scripts/build/build-deb.sh ${{ steps.version.outputs.version }} 1

      - name: Verify package with lintian
        run: |
          sudo env DEBIAN_FRONTEND=noninteractive bash -c '. ./linux/lib/apt.sh && apt_install_with_retry "lintian" apt-get install -y lintian'
          echo "Running lintian checks..."
          lintian --no-tag-display-limit build/*.deb || true
          echo ""
          echo "Package info:"
          dpkg-deb --info build/*.deb

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: debian-package
          path: build/*.deb
          retention-days: 30

  publish:
    name: Publish to APT Repository (${{ needs.build.outputs.suite }})
    needs: build
    uses: ./.github/workflows/reusable-deb-publish.yml
    with:
      artifact-name: debian-package
      suite: ${{ needs.build.outputs.suite }}
      version: ${{ needs.build.outputs.version }}
      summary-title: Debian Package Published
      install-command: curl -fsSL https://raw.githubusercontent.com/balejosg/openpath/gh-pages/apt/apt-bootstrap.sh | sudo bash
      create-index: true
      validate-published-metadata: true
      remove-legacy-stable-package: true
    secrets: inherit

  release:
    name: Upload to GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: debian-package
          path: packages/

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.build.outputs.version }}
          files: packages/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
