name: CI

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'firefox-extension/**'
      - 'linux/**'
      - 'windows/**'
      - 'tests/**'
      - '.release-please-manifest.json'
      - 'release-please-config.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
      - 'firefox-extension/**'
      - 'linux/**'
      - 'windows/**'
      - 'tests/**'
      - '.release-please-manifest.json'
      - 'release-please-config.json'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

# ============================================
# IMPORTANT: Local Verification Policy
# ============================================
# All lint, typecheck, unit tests, and E2E tests MUST be run locally
# before pushing (via `npm run verify:full`).
#
# This CI ONLY runs tests that REQUIRE specific OS environments plus
# a small Firefox delivery contract lane:
# - Linux dnsmasq tests (require Ubuntu with dnsmasq/systemd)
# - Windows agent tests (require Windows with Pester)
# - Token/Firefox delivery contract tests (Linux + Node)
#
# Local verification is MANDATORY before commit. See AGENTS.md.
# ============================================

jobs:
  detect-relevant-changes:
    name: Detect Relevant Changes
    runs-on: ubuntu-latest
    outputs:
      linux_bound: ${{ steps.filter.outputs.linux_bound }}
      windows_bound: ${{ steps.filter.outputs.windows_bound }}
      delivery_contracts: ${{ steps.filter.outputs.delivery_contracts }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect changed paths
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "linux_bound=true" >> "$GITHUB_OUTPUT"
            echo "windows_bound=true" >> "$GITHUB_OUTPUT"
            echo "delivery_contracts=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          changed_files="$(git diff --name-only "$base_sha" "$head_sha" || true)"
          if [ -z "$changed_files" ]; then
            changed_files="$(git show --pretty='' --name-only "$head_sha")"
          fi

          echo "Changed files:"
          if [ -n "$changed_files" ]; then
            echo "$changed_files"
          else
            echo "(none)"
          fi

          linux_bound=false
          windows_bound=false
          delivery_contracts=false

          if echo "$changed_files" | grep -Eq '^(linux/|tests/[^/]+\.bats$|tests/e2e/agent-integration\.bats$|tests/e2e/ci/run-linux-[^/]+\.sh|tests/e2e/Dockerfile|\.github/workflows/ci\.yml$)'; then
            linux_bound=true
          fi

          if echo "$changed_files" | grep -Eq '^(windows/|tests/e2e/Windows-E2E\.Tests\.ps1|tests/e2e/ci/run-windows-pester-isolated\.ps1|tests/e2e/ci/run-windows-[^/]+\.ps1|\.github/workflows/ci\.yml$)'; then
            windows_bound=true
          fi

          if echo "$changed_files" | grep -Eq '^(api/|firefox-extension/|windows/|tests/|\.github/workflows/ci\.yml$)'; then
            delivery_contracts=true
          fi

          echo "linux_bound=$linux_bound" >> "$GITHUB_OUTPUT"
          echo "windows_bound=$windows_bound" >> "$GITHUB_OUTPUT"
          echo "delivery_contracts=$delivery_contracts" >> "$GITHUB_OUTPUT"

  # ============================================
  # Job 1: Linux dnsmasq Agent Tests
  # ============================================
  test-linux-dnsmasq:
    name: Linux Agent Tests (BATS)
    runs-on: ubuntu-latest
    needs: detect-relevant-changes
    if: needs.detect-relevant-changes.outputs.linux_bound == 'true'
    outputs:
      tests_passed: ${{ steps.job-status.outputs.tests_passed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install dnsmasq
        run: |
          sudo env DEBIAN_FRONTEND=noninteractive bash -c '. ./linux/lib/apt.sh && apt_install_with_retry "dnsmasq" apt-get install -y dnsmasq'

      - name: Install BATS
        run: |
          sudo env DEBIAN_FRONTEND=noninteractive bash -c '. ./linux/lib/apt.sh && apt_install_with_retry "bats" apt-get install -y bats'

      - name: Run BATS unit tests
        id: run-bats-unit
        run: |
          cd tests && bats *.bats

      - name: Run Linux agent E2E tests
        id: run-linux-e2e
        run: |
          bats tests/e2e/agent-integration.bats

      - name: Record Linux lane outcome
        id: job-status
        if: always()
        run: |
          if [[ "${{ steps.run-bats-unit.outcome }}" == "success" ]] && \
             [[ "${{ steps.run-linux-e2e.outcome }}" == "success" ]]; then
            echo "tests_passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "tests_passed=false" >> "$GITHUB_OUTPUT"
          fi

  # ============================================
  # Job 2: Windows Agent Tests
  # ============================================
  test-windows:
    name: Windows Agent Tests (Pester)
    runs-on: [self-hosted, Windows, X64, proxmox, openpath]
    timeout-minutes: 25
    needs: detect-relevant-changes
    if: needs.detect-relevant-changes.outputs.windows_bound == 'true'
    outputs:
      tests_passed: ${{ steps.job-status.outputs.tests_passed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Prepare self-hosted Windows runner state
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File tests/e2e/ci/reset-self-hosted-windows-runner.ps1

      - name: Run Windows Unit Tests
        id: run-windows-unit-tests
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File tests/e2e/ci/run-windows-pester-isolated.ps1 `
            -RepoRoot (Get-Location).Path `
            -ResultsPath windows-test-results.xml `
            -TimeoutSeconds 840

      - name: Record Windows lane outcome
        id: job-status
        if: always()
        env:
          TESTS_PASSED: ${{ steps.run-windows-unit-tests.outcome == 'success' && 'true' || 'false' }}
        shell: pwsh
        run: |
          "tests_passed=$env:TESTS_PASSED" >> $env:GITHUB_OUTPUT

      - name: Restore self-hosted Windows runner state
        if: always()
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File tests/e2e/ci/reset-self-hosted-windows-runner.ps1

  # ============================================
  # Job 3: Firefox Delivery Contracts
  # ============================================
  test-delivery-contracts:
    name: Delivery Contracts (Node)
    runs-on: ubuntu-latest
    needs: detect-relevant-changes
    if: needs.detect-relevant-changes.outputs.delivery_contracts == 'true'
    outputs:
      tests_passed: ${{ steps.job-status.outputs.tests_passed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Restore Turbo cache
        id: restore-turbo-cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.ref_name }}-${{ hashFiles('package-lock.json', 'turbo.json', '**/package.json', '**/tsconfig*.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.ref_name }}-
            ${{ runner.os }}-turbo-

      - name: Start local PostgreSQL
        id: start-postgres
        run: |
          sudo systemctl start postgresql.service || sudo service postgresql start
          sudo -u postgres psql -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'openpath') THEN
              CREATE ROLE openpath LOGIN PASSWORD 'openpath_dev';
            ELSE
              ALTER ROLE openpath WITH LOGIN PASSWORD 'openpath_dev';
            END IF;
          END
          $$;
          SELECT pg_terminate_backend(pid)
          FROM pg_stat_activity
          WHERE datname = 'openpath' AND pid <> pg_backend_pid();
          DROP DATABASE IF EXISTS openpath;
          CREATE DATABASE openpath OWNER openpath;
          SQL

      - name: Install dependencies
        id: install-dependencies
        run: npm ci

      - name: Build required workspaces
        id: build-workspaces
        uses: ./.github/actions/build-workspaces
        with:
          build-shared: 'true'
          build-api: 'true'
          build-extension: 'true'

      - name: Run database migrations
        id: run-database-migrations
        run: |
          npm run db:migrate --workspace=@openpath/api
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: openpath
          DB_USER: openpath
          DB_PASSWORD: openpath_dev

      - name: Run token delivery contracts
        id: run-token-delivery-contracts
        run: npm run test:token-delivery --workspace=@openpath/api
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: openpath
          DB_USER: openpath
          DB_PASSWORD: openpath_dev
          JWT_SECRET: test-jwt-secret-for-ci-testing
          ADMIN_TOKEN: test-admin-token-for-ci
          SHARED_SECRET: test-shared-secret-for-ci

      - name: Run public request contracts
        id: run-public-request-contracts
        run: npm run test:public-requests --workspace=@openpath/api
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: openpath
          DB_USER: openpath
          DB_PASSWORD: openpath_dev
          JWT_SECRET: test-jwt-secret-for-ci-testing
          ADMIN_TOKEN: test-admin-token-for-ci
          SHARED_SECRET: test-shared-secret-for-ci

      - name: Run Firefox extension tests
        id: run-firefox-extension-tests
        run: npm test --workspace=@openpath/firefox-extension

      - name: Record delivery-contract lane outcome
        id: job-status
        if: always()
        run: |
          if [[ "${{ steps.setup-node.outcome }}" == "success" ]] && \
             [[ "${{ steps.restore-turbo-cache.outcome }}" == "success" ]] && \
             [[ "${{ steps.start-postgres.outcome }}" == "success" ]] && \
             [[ "${{ steps.install-dependencies.outcome }}" == "success" ]] && \
             [[ "${{ steps.build-workspaces.outcome }}" == "success" ]] && \
             [[ "${{ steps.run-database-migrations.outcome }}" == "success" ]] && \
             [[ "${{ steps.run-token-delivery-contracts.outcome }}" == "success" ]] && \
             [[ "${{ steps.run-public-request-contracts.outcome }}" == "success" ]] && \
             [[ "${{ steps.run-firefox-extension-tests.outcome }}" == "success" ]]; then
            echo "tests_passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "tests_passed=false" >> "$GITHUB_OUTPUT"
          fi

  # ============================================
  # Summary Job
  # ============================================
  # CI Success is the canonical required signal for this workflow. Each lane
  # records explicit pass/fail outputs so the summary can distinguish skipped
  # paths from actual test failures.
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [detect-relevant-changes, test-linux-dnsmasq, test-windows, test-delivery-contracts]
    if: always()

    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.test-linux-dnsmasq.result }}" != "skipped" ]] && \
             [[ "${{ needs.test-linux-dnsmasq.outputs.tests_passed }}" != "true" ]]; then
            echo "Linux Agent Tests (BATS) failed"
            exit 1
          fi

          if [[ "${{ needs.test-windows.result }}" != "skipped" ]]; then
            if [[ "${{ needs.test-windows.result }}" == "success" ]] && \
               [[ "${{ needs.test-windows.outputs.tests_passed }}" == "true" ]]; then
              echo "Windows Agent Tests (Pester) passed"
            elif [[ "${{ needs.test-windows.outputs.tests_passed }}" == "true" ]]; then
              echo "Windows Agent Tests (Pester) tests passed, but the hosted Windows job ended as ${{ needs.test-windows.result }}."
              echo "Treat this as hosted-runner teardown or infrastructure failure, not a Pester assertion failure."
              exit 1
            else
              echo "Windows Agent Tests (Pester) failed before reporting successful Pester output"
              exit 1
            fi
          fi

          if [[ "${{ needs.test-delivery-contracts.result }}" != "skipped" ]] && \
             [[ "${{ needs.test-delivery-contracts.outputs.tests_passed }}" != "true" ]]; then
            echo "Delivery Contracts (Node) failed"
            echo "CI Failed"
            exit 1
          fi
          echo "All CI checks passed"
