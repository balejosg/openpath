name: CI

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'firefox-extension/**'
      - 'linux/**'
      - 'windows/**'
      - 'tests/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
      - 'firefox-extension/**'
      - 'linux/**'
      - 'windows/**'
      - 'tests/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

# ============================================
# IMPORTANT: Local Verification Policy
# ============================================
# All lint, typecheck, unit tests, and E2E tests MUST be run locally
# before pushing (via `npm run verify:full`).
#
# This CI ONLY runs tests that REQUIRE specific OS environments plus
# a small Firefox delivery contract lane:
# - Linux dnsmasq tests (require Ubuntu with dnsmasq/systemd)
# - Windows agent tests (require Windows with Pester)
# - Token/Firefox delivery contract tests (Linux + Node)
#
# Local verification is MANDATORY before commit. See AGENTS.md.
# ============================================

jobs:
  detect-relevant-changes:
    name: Detect Relevant Changes
    runs-on: ubuntu-latest
    outputs:
      os_bound: ${{ steps.filter.outputs.os_bound }}
      delivery_contracts: ${{ steps.filter.outputs.delivery_contracts }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "os_bound=true" >> "$GITHUB_OUTPUT"
            echo "delivery_contracts=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          changed_files="$(git diff --name-only "$base_sha" "$head_sha" || true)"
          if [ -z "$changed_files" ]; then
            changed_files="$(git show --pretty='' --name-only "$head_sha")"
          fi

          echo "Changed files:"
          if [ -n "$changed_files" ]; then
            echo "$changed_files"
          else
            echo "(none)"
          fi

          os_bound=false
          delivery_contracts=false

          if echo "$changed_files" | grep -Eq '^(linux/|windows/|tests/|\.github/workflows/ci\.yml$)'; then
            os_bound=true
          fi

          if echo "$changed_files" | grep -Eq '^(api/|firefox-extension/|windows/|tests/|\.github/workflows/ci\.yml$)'; then
            delivery_contracts=true
          fi

          echo "os_bound=$os_bound" >> "$GITHUB_OUTPUT"
          echo "delivery_contracts=$delivery_contracts" >> "$GITHUB_OUTPUT"

  # ============================================
  # Job 1: Linux dnsmasq Agent Tests
  # ============================================
  test-linux-dnsmasq:
    name: Linux Agent Tests (BATS)
    runs-on: ubuntu-latest
    needs: detect-relevant-changes
    if: needs.detect-relevant-changes.outputs.os_bound == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install dnsmasq
        run: |
          sudo apt-get update
          sudo apt-get install -y dnsmasq

      - name: Install BATS
        run: |
          sudo apt-get install -y bats

      - name: Run BATS unit tests
        run: |
          cd tests && bats *.bats

      - name: Run Linux agent E2E tests
        run: |
          bats tests/e2e/agent-integration.bats

  # ============================================
  # Job 2: Windows Agent Tests
  # ============================================
  test-windows:
    name: Windows Agent Tests (Pester)
    runs-on: windows-latest
    needs: detect-relevant-changes
    if: needs.detect-relevant-changes.outputs.os_bound == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser
          Import-Module Pester

      - name: Run Windows Unit Tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = "windows/tests"
          $config.Output.Verbosity = "Detailed"
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = "windows-test-results.xml"
          $config.TestResult.OutputFormat = "NUnitXml"
          $result = Invoke-Pester -Configuration $config -PassThru

          @(
            '## Windows Agent Tests'
            ''
            "- Passed: $($result.PassedCount)"
            "- Failed: $($result.FailedCount)"
            "- Skipped: $($result.SkippedCount)"
            "- Result XML: windows-test-results.xml"
          ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

          if ($result.FailedCount -gt 0 -or $result.Result -ne 'Passed') {
            throw "Windows Pester suite failed with result '$($result.Result)'."
          }

  # ============================================
  # Job 3: Firefox Delivery Contracts
  # ============================================
  test-delivery-contracts:
    name: Delivery Contracts (Node)
    runs-on: ubuntu-latest
    needs: detect-relevant-changes
    if: needs.detect-relevant-changes.outputs.delivery_contracts == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Restore Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.ref_name }}-${{ hashFiles('package-lock.json', 'turbo.json', '**/package.json', '**/tsconfig*.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.ref_name }}-
            ${{ runner.os }}-turbo-

      - name: Start local PostgreSQL
        run: |
          sudo systemctl start postgresql.service || sudo service postgresql start
          sudo -u postgres psql -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'openpath') THEN
              CREATE ROLE openpath LOGIN PASSWORD 'openpath_dev';
            ELSE
              ALTER ROLE openpath WITH LOGIN PASSWORD 'openpath_dev';
            END IF;
          END
          $$;
          SELECT pg_terminate_backend(pid)
          FROM pg_stat_activity
          WHERE datname = 'openpath' AND pid <> pg_backend_pid();
          DROP DATABASE IF EXISTS openpath;
          CREATE DATABASE openpath OWNER openpath;
          SQL

      - name: Install dependencies
        run: npm ci

      - name: Build required workspaces
        uses: ./.github/actions/build-workspaces
        with:
          build-shared: 'true'
          build-api: 'true'
          build-extension: 'true'

      - name: Run database migrations
        run: |
          npm run drizzle:push --workspace=@openpath/api
          npm run db:migrate --workspace=@openpath/api
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: openpath
          DB_USER: openpath
          DB_PASSWORD: openpath_dev

      - name: Run token delivery contracts
        run: npm run test:token-delivery --workspace=@openpath/api
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: openpath
          DB_USER: openpath
          DB_PASSWORD: openpath_dev
          JWT_SECRET: test-jwt-secret-for-ci-testing
          ADMIN_TOKEN: test-admin-token-for-ci
          SHARED_SECRET: test-shared-secret-for-ci

      - name: Run Firefox extension tests
        run: npm test --workspace=@openpath/firefox-extension

  # ============================================
  # Summary Job
  # ============================================
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [detect-relevant-changes, test-linux-dnsmasq, test-windows, test-delivery-contracts]
    if: always()

    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.test-linux-dnsmasq.result }}" == "failure" ]] || \
             [[ "${{ needs.test-windows.result }}" == "failure" ]] || \
             [[ "${{ needs.test-delivery-contracts.result }}" == "failure" ]]; then
            echo "CI Failed"
            exit 1
          fi
          echo "All CI checks passed"
