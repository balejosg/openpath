name: Reusable Coverage Workflow

on:
  workflow_call:
    inputs:
      test-type:
        description: 'Coverage lane to run (api, web, spa, shared, extension)'
        required: true
        type: string
      node-version:
        description: 'Node.js version'
        required: false
        type: string
        default: '20'
      run-coverage:
        description: 'Upload coverage report'
        required: false
        type: boolean
        default: true
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  test:
    name: Run Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: ${{ inputs.test-type == 'api' && 'postgres:16' || '' }}
        env:
          POSTGRES_USER: openpath
          POSTGRES_PASSWORD: openpath_dev
          POSTGRES_DB: openpath
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve coverage lane
        id: lane
        shell: bash
        run: |
          set -euo pipefail

          echo "needs_node=true" >> "$GITHUB_OUTPUT"
          echo "needs_postgres=false" >> "$GITHUB_OUTPUT"
          echo "build_shared=false" >> "$GITHUB_OUTPUT"
          echo "build_api=false" >> "$GITHUB_OUTPUT"
          echo "build_spa=false" >> "$GITHUB_OUTPUT"
          echo "build_dashboard=false" >> "$GITHUB_OUTPUT"
          echo "build_extension=false" >> "$GITHUB_OUTPUT"

          case "${{ inputs.test-type }}" in
            api)
              {
                echo "needs_postgres=true"
                echo "build_shared=true"
                echo "build_api=true"
                echo "build_extension=true"
                echo "test_command=npm run test:coverage --workspace=@openpath/api"
                echo "coverage_file=api/coverage/lcov.info"
                echo "coverage_dir=api/coverage"
                echo "coverage_flag=api"
              } >> "$GITHUB_OUTPUT"
              ;;
            web)
              {
                echo "build_shared=true"
                echo "build_api=true"
                echo "test_command=npm run test:coverage --workspace=@openpath/dashboard"
                echo "coverage_file=dashboard/coverage/lcov.info"
                echo "coverage_dir=dashboard/coverage"
                echo "coverage_flag=dashboard"
              } >> "$GITHUB_OUTPUT"
              ;;
            spa)
              {
                echo "build_shared=true"
                echo "build_api=true"
                echo "test_command=npm run test:coverage --workspace=@openpath/react-spa"
                echo "coverage_file=react-spa/coverage/lcov.info"
                echo "coverage_dir=react-spa/coverage"
                echo "coverage_flag=spa"
              } >> "$GITHUB_OUTPUT"
              ;;
            shared)
              {
                echo "build_shared=true"
                echo "test_command=npm run test:coverage --workspace=@openpath/shared"
                echo "coverage_file=shared/coverage/lcov.info"
                echo "coverage_dir=shared/coverage"
                echo "coverage_flag=shared"
              } >> "$GITHUB_OUTPUT"
              ;;
            extension)
              {
                echo "build_extension=true"
                echo "test_command=npm run test:coverage --workspace=@openpath/firefox-extension"
                echo "coverage_file=firefox-extension/coverage/lcov.info"
                echo "coverage_dir=firefox-extension/coverage"
                echo "coverage_flag=firefox-extension"
              } >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unsupported coverage lane: ${{ inputs.test-type }}"
              exit 1
              ;;
          esac

      - name: Setup Node.js
        if: steps.lane.outputs.needs_node == 'true'
        uses: ./.github/actions/setup-node
        with:
          node-version: ${{ inputs.node-version }}

      - name: Build workspaces
        if: steps.lane.outputs.needs_node == 'true'
        uses: ./.github/actions/build-workspaces
        with:
          build-shared: ${{ steps.lane.outputs.build_shared }}
          build-api: ${{ steps.lane.outputs.build_api }}
          build-spa: ${{ steps.lane.outputs.build_spa }}
          build-dashboard: ${{ steps.lane.outputs.build_dashboard }}
          build-extension: ${{ steps.lane.outputs.build_extension }}

      - name: Run database migrations
        if: steps.lane.outputs.needs_postgres == 'true'
        run: |
          npm run drizzle:push --workspace=@openpath/api
          npm run db:migrate --workspace=@openpath/api
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: openpath
          DB_USER: openpath
          DB_PASSWORD: openpath_dev

      - name: Run coverage lane
        run: ${{ steps.lane.outputs.test_command }}
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: openpath
          DB_USER: openpath
          DB_PASSWORD: openpath_dev
          ADMIN_TOKEN: test-admin-token-for-ci
          SHARED_SECRET: test-shared-secret-for-ci
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Coverage upload
      - name: Upload coverage to Codecov
        if: inputs.run-coverage
        uses: codecov/codecov-action@v6
        with:
          disable_search: true
          files: ${{ steps.lane.outputs.coverage_file }}
          flags: ${{ steps.lane.outputs.coverage_flag }}
          name: ${{ inputs.test-type }}-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        if: inputs.run-coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ inputs.test-type }}
          path: ${{ steps.lane.outputs.coverage_dir }}
          retention-days: 7
