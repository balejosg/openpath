name: E2E Tests

on:
  push:
    branches: [main, master]
    paths:
      - 'api/**'
      - 'shared/**'
      - 'linux/install.sh'
      - 'linux/uninstall.sh'
      - 'linux/debian-package/**'
      - 'linux/lib/**'
      - 'linux/scripts/**'
      - 'windows/**'
      - 'firefox-extension/**'
      - 'tests/e2e/**'
      - 'tests/selenium/**'
      - 'package.json'
      - 'package-lock.json'
      - 'docker-compose.test.yml'
      - 'scripts/require-release-quality-gate.mjs'
      - '.github/actions/setup-node/**'
      - '.github/actions/build-workspaces/**'
      - '.github/workflows/e2e-tests.yml'
      - '.github/workflows/installer-contracts.yml'
      - '.github/workflows/prerelease-deb.yml'
      - '.github/workflows/release-extension.yml'
      - '.github/workflows/release-scripts.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: e2e-tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-relevant-changes:
    name: Detect Relevant Changes
    runs-on: ubuntu-latest
    outputs:
      release_infra_only: ${{ steps.filter.outputs.release_infra_only }}
      linux_e2e: ${{ steps.filter.outputs.linux_e2e }}
      windows_e2e: ${{ steps.filter.outputs.windows_e2e }}
      linux_student_policy: ${{ steps.filter.outputs.linux_student_policy }}
      windows_student_policy: ${{ steps.filter.outputs.windows_student_policy }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect changed paths
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release_infra_only=false" >> "$GITHUB_OUTPUT"
            echo "linux_e2e=true" >> "$GITHUB_OUTPUT"
            echo "windows_e2e=true" >> "$GITHUB_OUTPUT"
            echo "linux_student_policy=true" >> "$GITHUB_OUTPUT"
            echo "windows_student_policy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          changed_files="$(git diff --name-only "$base_sha" "$head_sha" || true)"
          if [ -z "$changed_files" ]; then
            changed_files="$(git show --pretty='' --name-only "$head_sha")"
          fi

          echo "Changed files:"
          if [ -n "$changed_files" ]; then
            echo "$changed_files"
          else
            echo "(none)"
          fi

          linux_e2e=false
          windows_e2e=false
          linux_student_policy=false
          windows_student_policy=false
          release_infra_only=false

          if [ -n "$changed_files" ] && echo "$changed_files" | grep -Eq '^(.github/workflows/(installer-contracts|prerelease-deb|release-extension|release-scripts)\.yml|scripts/require-release-quality-gate\.mjs|tests/repo-config/)'; then
            non_release_infra_files="$(
              echo "$changed_files" |
                grep -Ev '^(.github/workflows/(installer-contracts|prerelease-deb|release-extension|release-scripts)\.yml|scripts/require-release-quality-gate\.mjs|tests/repo-config/)' || true
            )"
            if [ -z "$non_release_infra_files" ]; then
              release_infra_only=true
            fi
          fi

          if [ "$release_infra_only" != "true" ] && echo "$changed_files" | grep -Eq '^(linux/|runtime/|firefox-extension/|tests/e2e/(Dockerfile|Dockerfile\.bats-runner|agent-integration\.bats|ci/run-linux-e2e\.sh|docker-compose\.e2e\.yml|docker-e2e-runner\.sh|linux-e2e-tests\.sh|pre-install-validation\.sh|validation/)|package\.json$|package-lock\.json$|scripts/require-release-quality-gate\.mjs$|\.github/actions/(setup-node|build-workspaces)/|\.github/workflows/(e2e-tests|installer-contracts|prerelease-deb|release-extension|release-scripts)\.yml$)'; then
            linux_e2e=true
          fi

          if [ "$release_infra_only" != "true" ] && echo "$changed_files" | grep -Eq '^(windows/|runtime/|firefox-extension/|tests/e2e/(Windows-E2E\.Tests\.ps1|ci/run-windows-e2e\.ps1|ci/report-windows-processes\.ps1|validation/)|package\.json$|package-lock\.json$|scripts/require-release-quality-gate\.mjs$|\.github/workflows/(e2e-tests|installer-contracts|prerelease-deb|release-extension|release-scripts)\.yml$)'; then
            windows_e2e=true
          fi

          if [ "$release_infra_only" != "true" ] && echo "$changed_files" | grep -Eq '^(api/|shared/|linux/|runtime/|firefox-extension/|tests/e2e/(Dockerfile\.student|ci/run-linux-student-flow\.sh|student-flow/|validation/)|tests/selenium/|docker-compose\.test\.yml$|package\.json$|package-lock\.json$|scripts/require-release-quality-gate\.mjs$|\.github/actions/setup-node/|\.github/workflows/(e2e-tests|installer-contracts|prerelease-deb|release-extension|release-scripts)\.yml$)'; then
            linux_student_policy=true
          fi

          if [ "$release_infra_only" != "true" ] && echo "$changed_files" | grep -Eq '^(api/|shared/|windows/|runtime/|firefox-extension/|tests/e2e/(ci/run-windows-student-flow\.ps1|student-flow/|validation/)|tests/selenium/|package\.json$|package-lock\.json$|scripts/require-release-quality-gate\.mjs$|\.github/actions/setup-node/|\.github/workflows/(e2e-tests|installer-contracts|prerelease-deb|release-extension|release-scripts)\.yml$)'; then
            windows_student_policy=true
          fi

          echo "release_infra_only=$release_infra_only" >> "$GITHUB_OUTPUT"
          echo "linux_e2e=$linux_e2e" >> "$GITHUB_OUTPUT"
          echo "windows_e2e=$windows_e2e" >> "$GITHUB_OUTPUT"
          echo "linux_student_policy=$linux_student_policy" >> "$GITHUB_OUTPUT"
          echo "windows_student_policy=$windows_student_policy" >> "$GITHUB_OUTPUT"

  # ============================================
  # Linux E2E Tests (Docker-based for full DNS control)
  # ============================================
  linux-e2e:
    name: Linux E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    needs: detect-relevant-changes
    if: needs.detect-relevant-changes.outputs.linux_e2e == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: ./.github/actions/setup-node
        with:
          cache-playwright: true

      - name: Build Firefox Extension
        uses: ./.github/actions/build-workspaces
        with:
          build-shared: 'false'
          build-api: 'false'
          build-extension: 'true'

      - name: Run Linux E2E (systemd container)
        shell: bash
        run: |
          bash tests/e2e/ci/run-linux-e2e.sh

  # ============================================
  # Windows E2E Tests
  # ============================================
  windows-e2e:
    name: Windows E2E
    runs-on: [self-hosted, Windows, X64, proxmox, openpath]
    timeout-minutes: 25
    needs: detect-relevant-changes
    if: needs.detect-relevant-changes.outputs.windows_e2e == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Prepare self-hosted Windows runner state
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File tests/e2e/ci/reset-self-hosted-windows-runner.ps1

      - name: Run Windows E2E
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File tests/e2e/ci/run-windows-e2e.ps1

      - name: Restore self-hosted Windows runner state
        if: always()
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File tests/e2e/ci/reset-self-hosted-windows-runner.ps1

  # ============================================
  # Linux Student Policy Tests
  # ============================================
  linux-student-policy:
    name: Linux Student Policy
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: detect-relevant-changes
    if: needs.detect-relevant-changes.outputs.linux_student_policy == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: ./.github/actions/setup-node
        with:
          cache-playwright: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Linux student-policy flow
        shell: bash
        run: |
          bash tests/e2e/ci/run-linux-student-flow.sh

      - name: Upload Linux student-policy diagnostics
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: linux-student-policy-artifacts-${{ github.run_id }}
          path: tests/e2e/artifacts/linux-student-policy
          if-no-files-found: ignore
          retention-days: 7

  # ============================================
  # Windows Student Policy Tests
  # ============================================
  windows-student-policy:
    name: Windows Student Policy
    runs-on: [self-hosted, Windows, X64, proxmox, openpath]
    timeout-minutes: 50
    needs: detect-relevant-changes
    if: needs.detect-relevant-changes.outputs.windows_student_policy == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Prepare self-hosted Windows runner state
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File tests/e2e/ci/reset-self-hosted-windows-runner.ps1

      - name: Setup Node.js
        uses: ./.github/actions/setup-node
        with:
          cache-dependency-path: |
            package-lock.json
            tests/selenium/package-lock.json

      - name: Run Windows student-policy flow
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File tests/e2e/ci/run-windows-student-flow.ps1

      - name: Restore self-hosted Windows runner state
        if: always()
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File tests/e2e/ci/reset-self-hosted-windows-runner.ps1

      - name: Upload Windows student-policy diagnostics
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: windows-student-policy-artifacts-${{ github.run_id }}
          path: tests/e2e/artifacts/windows-student-policy
          if-no-files-found: ignore
          retention-days: 7

  # ============================================
  # Summary Job
  # ============================================
  e2e-summary:
    name: E2E Summary
    runs-on: ubuntu-latest
    needs:
      [
        detect-relevant-changes,
        linux-e2e,
        windows-e2e,
        linux-student-policy,
        windows-student-policy,
      ]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "📊 E2E Test Summary"
          echo "===================="

          if [[ "${{ needs.detect-relevant-changes.result }}" != "success" ]]; then
            echo "❌ Detect Relevant Changes: ${{ needs.detect-relevant-changes.result }}"
          else
            echo "✅ Detect Relevant Changes: PASSED"
          fi

          if [[ "${{ needs.linux-e2e.result }}" == "success" ]]; then
            echo "✅ Linux E2E: PASSED"
          elif [[ "${{ needs.linux-e2e.result }}" == "skipped" ]]; then
            echo "⏭️ Linux E2E: SKIPPED"
          else
            echo "❌ Linux E2E: ${{ needs.linux-e2e.result }}"
          fi

          if [[ "${{ needs.windows-e2e.result }}" == "success" ]]; then
            echo "✅ Windows E2E: PASSED"
          elif [[ "${{ needs.windows-e2e.result }}" == "skipped" ]]; then
            echo "⏭️ Windows E2E: SKIPPED"
          else
            echo "❌ Windows E2E: ${{ needs.windows-e2e.result }}"
          fi

          if [[ "${{ needs.linux-student-policy.result }}" == "success" ]]; then
            echo "✅ Linux Student Policy: PASSED"
          elif [[ "${{ needs.linux-student-policy.result }}" == "skipped" ]]; then
            echo "⏭️ Linux Student Policy: SKIPPED"
          else
            echo "❌ Linux Student Policy: ${{ needs.linux-student-policy.result }}"
          fi

          if [[ "${{ needs.windows-student-policy.result }}" == "success" ]]; then
            echo "✅ Windows Student Policy: PASSED"
          elif [[ "${{ needs.windows-student-policy.result }}" == "skipped" ]]; then
            echo "⏭️ Windows Student Policy: SKIPPED"
          else
            echo "❌ Windows Student Policy: ${{ needs.windows-student-policy.result }}"
          fi

          if [[ "${{ needs.detect-relevant-changes.result }}" == "failure" ]] || \
             [[ "${{ needs.detect-relevant-changes.result }}" == "cancelled" ]] || \
             [[ "${{ needs.linux-e2e.result }}" == "failure" ]] || \
             [[ "${{ needs.linux-e2e.result }}" == "cancelled" ]] || \
             [[ "${{ needs.linux-student-policy.result }}" == "failure" ]] || \
             [[ "${{ needs.linux-student-policy.result }}" == "cancelled" ]] || \
             [[ "${{ needs.windows-e2e.result }}" == "failure" ]] || \
             [[ "${{ needs.windows-student-policy.result }}" == "failure" ]] || \
             [[ "${{ needs.windows-student-policy.result }}" == "cancelled" ]] || \
              [[ "${{ needs.windows-e2e.result }}" == "cancelled" ]]; then
            echo ""
            echo "❌ E2E Tests FAILED"
            exit 1
          fi

          echo ""
          echo "✅ E2E Tests Complete"
