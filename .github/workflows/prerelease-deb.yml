name: Build Prerelease Deb

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

permissions:
  actions: read
  contents: write
  pages: write
  id-token: write

jobs:
  ci-success:
    name: Inspect CI Success summary job
    runs-on: ubuntu-latest
    outputs:
      ci_success_conclusion: ${{ steps.inspect.outputs.ci_success_conclusion }}

    steps:
      - name: Recover CI Success conclusion
        id: inspect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ci_success_conclusion="$(
            gh api repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/jobs \
              --paginate \
              --jq '.jobs[] | select(.name == "CI Success") | .conclusion' \
              | tail -n 1
          )"

          if [ -z "$ci_success_conclusion" ]; then
            echo "::error title=Missing CI Success summary job::Expected the triggering CI workflow to publish a CI Success summary job."
            exit 1
          fi

          echo "ci_success_conclusion=$ci_success_conclusion" >> "$GITHUB_OUTPUT"

  build-prerelease:
    name: Build Prerelease Package
    runs-on: ubuntu-latest
    needs: ci-success
    if: ${{ needs.ci-success.outputs.ci_success_conclusion == 'success' }}
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get version from run number
        id: version
        run: |
          # Use workflow run number as version
          VERSION="0.0.${{ github.event.workflow_run.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "package_name=openpath-dnsmasq_${VERSION}-1_amd64.deb" >> $GITHUB_OUTPUT
          echo "Building prerelease version: $VERSION"

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Build Firefox Extension
        uses: ./.github/actions/build-workspaces
        with:
          build-shared: 'false'
          build-api: 'false'
          build-extension: 'true'

      - name: Build Debian package
        run: |
          chmod +x linux/scripts/build/build-deb.sh
          ./linux/scripts/build/build-deb.sh ${{ steps.version.outputs.version }} 1

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: prerelease-deb-package
          path: build/*.deb
          retention-days: 14

  publish-prerelease:
    name: Publish Prerelease to APT Repository
    needs: build-prerelease
    uses: ./.github/workflows/reusable-deb-publish.yml
    with:
      artifact-name: prerelease-deb-package
      suite: unstable
      version: ${{ needs.build-prerelease.outputs.version }}
      summary-title: Prerelease Deb Published
      install-command: curl -fsSL https://raw.githubusercontent.com/balejosg/openpath/gh-pages/apt/apt-bootstrap.sh | sudo bash -s -- --unstable
    secrets: inherit
