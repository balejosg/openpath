name: 'Build Workspaces'
description: 'Build monorepo workspaces in correct dependency order'

inputs:
  build-shared:
    description: 'Build @openpath/shared package'
    required: false
    default: 'true'
  build-api:
    description: 'Build @openpath/api package (for type exports)'
    required: false
    default: 'true'
  build-spa:
    description: 'Build @openpath/react-spa package'
    required: false
    default: 'false'
  build-dashboard:
    description: 'Build @openpath/dashboard package'
    required: false
    default: 'false'
  build-extension:
    description: 'Build openpath-firefox-extension package'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Build selected workspaces with Turbo
      shell: bash
      run: |
        set -euo pipefail

        filters=()
        if [ "${{ inputs.build-shared }}" = 'true' ]; then
          filters+=(--filter=@openpath/shared)
        fi
        if [ "${{ inputs.build-api }}" = 'true' ]; then
          filters+=(--filter=@openpath/api)
        fi
        if [ "${{ inputs.build-spa }}" = 'true' ]; then
          filters+=(--filter=@openpath/react-spa)
        fi
        if [ "${{ inputs.build-dashboard }}" = 'true' ]; then
          filters+=(--filter=@openpath/dashboard)
        fi
        if [ "${{ inputs.build-extension }}" = 'true' ]; then
          filters+=(--filter=@openpath/firefox-extension)
        fi

        if [ "${#filters[@]}" -eq 0 ]; then
          echo 'No workspaces selected for build.'
          exit 0
        fi

        npx turbo run build "${filters[@]}"
