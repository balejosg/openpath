name: 'Setup Node.js Environment'
description: 'Setup Node.js with npm caching and install dependencies'

inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '20'
  install-deps:
    description: 'Whether to run npm ci'
    required: false
    default: 'true'
  working-directory:
    description: 'Working directory for npm ci'
    required: false
    default: '.'
  cache-playwright:
    description: 'Whether to restore/save the Linux Playwright browser cache'
    required: false
    default: 'false'
  cache-dependency-path:
    description: 'Lockfile path or newline-delimited lockfile paths for the npm cache key'
    required: false
    default: './package-lock.json'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'
        cache-dependency-path: ${{ inputs.cache-dependency-path }}

    - name: Restore Playwright browser cache
      if: inputs.cache-playwright == 'true'
      uses: actions/cache@v5
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json', 'react-spa/package.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install dependencies
      if: inputs.install-deps == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm ci
