<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sitio bloqueado</title>
    <link rel="stylesheet" href="blocked.css" />
  </head>
  <body>
    <main class="lock-screen">
      <section class="panel" aria-labelledby="blocked-title">
        <div class="brand-row">
          <img src="../icons/icon-96.png" alt="" width="48" height="48" />
          <p class="eyebrow">OpenPath</p>
        </div>

        <h1 id="blocked-title">Este sitio esta bloqueado por ahora</h1>
        <p class="message">
          Si forma parte de tu actividad, puedes pedir que lo revisen. La solicitud quedara
          pendiente hasta que la aprueben.
        </p>

        <section class="domain-summary" aria-label="Sitio solicitado">
          <p>Sitio solicitado</p>
          <strong id="blocked-domain">-</strong>
        </section>

        <form id="request-form" class="request-form">
          <label for="request-reason">Por que lo necesitas?</label>
          <textarea
            id="request-reason"
            maxlength="200"
            rows="3"
            placeholder="Ejemplo: lo necesito para la actividad de clase"
          ></textarea>
          <button id="submit-unblock-request" type="button">Solicitar desbloqueo</button>
        </form>

        <p
          id="request-status"
          class="feedback request-feedback"
          role="status"
          aria-live="polite"
        ></p>

        <div class="actions" aria-label="Acciones secundarias">
          <button id="go-back" class="secondary-button" type="button">Volver</button>
          <button id="copy-domain" class="secondary-button" type="button">Copiar dominio</button>
        </div>

        <details class="technical-details">
          <summary>Ver detalles tecnicos</summary>
          <dl>
            <div>
              <dt>Motivo tecnico</dt>
              <dd id="blocked-error">-</dd>
            </div>
            <div>
              <dt>Pagina origen</dt>
              <dd id="blocked-origin">-</dd>
            </div>
          </dl>
        </details>

        <p id="copy-feedback" class="feedback" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="blocked.js"></script>
  </body>
</html>
